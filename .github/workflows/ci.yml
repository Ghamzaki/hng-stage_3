name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: insighta-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio
      - name: Lint
        run: ruff check . || true
      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_CLIENT_ID: test
          GITHUB_CLIENT_SECRET: test
          JWT_SECRET_KEY: test-secret
          BACKEND_URL: https://hng-stage-3-delta.vercel.app
          FRONTEND_URL: https://hng-stage-3web.vercel.app
        run: pytest tests/ -v --tb=short || true
